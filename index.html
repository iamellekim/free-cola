<html lang="ko" data-theme="coke">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공짜 콜라 자판기 · 리뷰 자판기</title>
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+CiAgPGNpcmNsZSBjeD0iMzIiIGN5PSIzMiIgcj0iMjciIGZpbGw9IiNGRkQyM0UiIHN0cm9rZT0iI0Q5QTQwMCIgc3Ryb2tlLXdpZHRoPSI0Ii8+CiAgPGNpcmNsZSBjeD0iMzIiIGN5PSIzMiIgcj0iMjAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI0U5QjgwMCIgc3Ryb2tlLXdpZHRoPSIyIi8+CiAgPHRleHQgeD0iMzIiIHk9IjQzIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMzAiIGZvbnQtd2VpZ2h0PSI5MDAiIGZpbGw9IiM5QTc0MDAiPuKCqTwvdGV4dD4KPC9zdmc+" type="image/svg+xml">
<meta property="og:type" content="website">
<meta property="og:title" content="공짜 콜라 자판기 · 리뷰 자판기">
<meta property="og:description" content="키워드만 넣으면 리뷰가 톡- 하고 나오는 리뷰 자판기">
<meta property="og:image" content="OGimage.svg">
<style>
  @import url('https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.1/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css');
  :root{
    /* ── 펩시 제로 (기본) ── */
    --bg:#EFECE6;        /* 전체 배경 (크림) */
    --card:#FFFFFF;      /* 카드 메인 */
    --card2:#F6F3EF;     /* 레이어용 밝은 톤 */
    --line:#E7E1D9;      /* 경계선 */
    --txt:#160F0C;       /* 메인 텍스트 (다크) */
    --sub:#8A817A;       /* 서브 텍스트 */
    --accent:#160F0C;    /* 다크 메인 */
    --accent-d:#2E211A;  /* 다크 호버 */
    --ink:#160F0C;       /* 텍스트·배출구 등 다크요소 */
    --machine:#160F0C;   /* 자판기 본체 */
    --chip:#F6F3EF;      /* 칩 배경 (미선택) */
    --chip-txt:#160F0C;  /* 칩 텍스트 */
    --chip-on:#DEFF3A; --chip-on-txt:#160F0C;  /* 선택 칩 */
    --tray:#33373f;      /* 배출구 트레이 */
    --star:#DEFF3A; --pop:#DEFF3A; --warn:#DEFF3A;
    --copy-bg:#DEFF3A; --copy-txt:#160F0C; --copy-hover:#C6E82A;
    --coin-hover:#C6E82A;
  }
  /* ── 코카콜라 테마 (기본) ── */
  html[data-theme="coke"]{
    --txt:#241F1D; --accent:#D8382C; --accent-d:#B82C22; --ink:#241F1D; --machine:#D8382C;
    --chip:#F6F3EF; --chip-txt:#241F1D; --chip-on:#D8382C; --chip-on-txt:#FFFFFF; --tray:#241F1D;
    --star:#FFC53D; --pop:#FFD23E; --warn:#FFD23E;
    --copy-bg:#D8382C; --copy-txt:#FFFFFF; --copy-hover:#B82C22;
    --coin-hover:#B82C22;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--txt); min-height:100vh; padding:32px 16px 60px;
  }
  button,input,textarea,select{font-family:inherit}
  .wrap{max-width:460px;margin:0 auto}
  /* ── 테마 토글 (우측 상단) ── */
  .theme-toggle{
    position:fixed;top:14px;right:14px;z-index:50;display:flex;gap:2px;
    background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px;
    box-shadow:0 4px 14px rgba(0,0,0,.1);
  }
  .theme-toggle button{
    border:none;background:transparent;color:var(--sub);font-size:12px;font-weight:800;
    padding:7px 13px;border-radius:999px;cursor:pointer;transition:.12s;white-space:nowrap;
  }
  .theme-toggle button.on{background:var(--accent);color:#fff}
  /* 진열창 캔 이미지 (테마별) */
  .can{height:58px;width:auto;display:none}
  html[data-theme="coke"] .can-coke{display:block}
  html[data-theme="pepsi"] .can-pepsi{display:block}
  /* ── 자판기 본체 ── */
  .machine{
    position:relative;
    background:var(--machine);border-radius:28px;padding:14px;
    box-shadow:0 20px 48px rgba(22,15,12,.35), inset 0 0 0 3px rgba(255,255,255,.1);
  }
  .reset-btn{
    position:absolute;top:14px;right:14px;z-index:2;width:34px;height:34px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(255,255,255,.14);border:none;border-radius:50%;color:#fff;cursor:pointer;transition:.12s;
  }
  .reset-btn:hover{background:rgba(255,255,255,.28)}
  .reset-btn svg{width:18px;height:18px}
  .machine-top{text-align:center;padding:12px 10px 16px}
  .brand{font-size:23px;font-weight:600;letter-spacing:-1px;color:#fff}
  .brand .em{color:var(--pop);font-size:23px;font-weight:600}
  .brand-sub{margin-top:7px;font-size:12px;font-weight:600;color:rgba(255,255,255,.82)}
  /* ── 진열창 (콜라 캔) ── */
  .window{
    background:#fff;border-radius:16px;padding:8px 16px;margin-bottom:12px;
    display:flex;align-items:center;justify-content:center;gap:16px;
    box-shadow:inset 0 3px 10px rgba(20,15,12,.1);
  }
  .window .cap{font-size:13px;font-weight:700;color:var(--accent);line-height:1.5}
  .window .cap small{display:block;color:var(--sub);font-weight:600;font-size:11px;margin-top:3px}
  /* ── 조작 패널 ── */
  .panel{background:var(--card);border-radius:18px;padding:22px;border:1px solid var(--line)}
  .slot-label{text-align:center;color:rgba(255,255,255,.9);font-size:12px;font-weight:700;letter-spacing:.3px;margin:16px 0 9px}
  /* ── 배출구(트레이) ── */
  .tray{
    background:var(--tray);border-radius:16px;padding:16px;
    box-shadow:inset 0 4px 14px rgba(0,0,0,.5);
  }
  .tray::before{content:"";display:block;height:7px;width:66%;margin:-3px auto 14px;background:#0d0d0d;border-radius:4px}
  .tray label{color:#EFECE6}
  .tray .out-head .cnt{color:#b8b0a8}
  .tray .out-head .cnt b{color:var(--pop)}
  label{display:block;font-size:13px;color:var(--txt);margin-bottom:11px;font-weight:600;letter-spacing:-.1px}
  .note{color:var(--sub);font-weight:500;font-size:12px;margin-left:1px}
  input[type=text],textarea{
    width:100%;background:var(--card2);border:1px solid var(--line);border-radius:11px;
    color:var(--txt);padding:13px 14px;font-size:15px;font-family:inherit;outline:none;transition:.15s;
  }
  input[type=text]:focus,textarea:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(20,15,12,.14)}
  .seg{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:5px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .seg::-webkit-scrollbar{height:6px}
  .seg::-webkit-scrollbar-thumb{background:transparent;border-radius:3px;transition:background .25s}
  .seg::-webkit-scrollbar-track{background:transparent}
  .seg:hover,.seg:active,.seg:focus-within{scrollbar-width:thin}
  .seg:hover::-webkit-scrollbar-thumb,.seg:active::-webkit-scrollbar-thumb{background:#e0d9cf}
  .seg button{
    flex:0 0 auto;white-space:nowrap;
    background:var(--chip);border:1px solid var(--line);color:var(--chip-txt);
    padding:9px 15px;border-radius:999px;font-size:13px;cursor:pointer;transition:.12s;font-weight:600;
  }
  .seg button:hover{filter:brightness(.94)}
  .seg button.on{background:var(--chip-on);color:var(--chip-on-txt)}
  .recos{
    display:flex;gap:8px;flex-wrap:wrap;max-height:120px;overflow-y:auto;
    background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px;scrollbar-width:none;
  }
  .recos::-webkit-scrollbar{width:7px}
  .recos::-webkit-scrollbar-thumb{background:transparent;border-radius:4px;transition:background .25s}
  .recos::-webkit-scrollbar-track{background:transparent}
  .recos:hover,.recos:active,.recos:focus-within{scrollbar-width:thin}
  .recos:hover::-webkit-scrollbar-thumb,.recos:active::-webkit-scrollbar-thumb{background:#cdcdd0}
  .recos button{
    background:#fff;border:1px solid var(--line);color:var(--chip-txt);
    padding:7px 13px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;transition:.12s;
  }
  .recos button:hover{filter:brightness(.94)}
  .recos button.on{background:var(--chip-on);border-color:var(--chip-on);color:var(--chip-on-txt)}
  .stars{display:flex;gap:5px;font-size:28px;cursor:pointer;user-select:none}
  .stars span{color:#d4d4d6;transition:.1s}
  .stars span.on{color:var(--star)}
  .len-wrap{display:flex;align-items:center;gap:10px;margin-top:4px}
  .len-wrap input[type=range]{flex:1;accent-color:var(--pop)}
  .len-val{font-size:13px;color:var(--sub);min-width:64px;text-align:right;font-weight:600}
  /* 동전 투입구 버튼 */
  .coinbtn{
    position:relative;width:100%;margin-top:14px;padding:9px 16px 10px;
    background:var(--ink);border:none;border-radius:14px;cursor:pointer;overflow:hidden;color:#fff;transition:.12s;
  }
  .coinbtn:hover{background:var(--coin-hover)}
  .coinbtn:active{transform:translateY(1px)}
  .coinbtn .slot{
    position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:56px;height:7px;background:#0d0d0d;border-radius:5px;box-shadow:inset 0 2px 3px rgba(0,0,0,.85),0 1px 0 rgba(255,255,255,.08);
  }
  .coinbtn .label{display:block;margin-top:12px;font-size:15px;font-weight:800;letter-spacing:2px}
  .coinbtn .coin{
    position:absolute;top:-30px;left:50%;margin-left:-12px;width:24px;height:24px;border-radius:50%;
    background:var(--pop);border:2px solid #D9A400;opacity:0;z-index:2;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#9a7400;
  }
  .coinbtn.inserting .coin{animation:coinDrop .55s cubic-bezier(.5,0,.7,1) forwards}
  @keyframes coinDrop{
    0%{top:-30px;opacity:1;transform:rotate(0deg) scale(1)}
    55%{top:2px;opacity:1;transform:rotate(200deg) scale(1)}
    100%{top:9px;opacity:0;transform:rotate(300deg) scale(.5)}
  }
  .out-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .out-head .cnt{font-size:13px;color:var(--sub)}
  .out-head .cnt b{color:var(--accent)}
  #output{
    width:100%;min-height:200px;line-height:1.8;font-size:15px;resize:vertical;
    background:var(--card2);border:1px solid var(--line);border-radius:11px;color:var(--txt);padding:16px;font-family:inherit;
  }
  .actions{display:flex;gap:10px;margin-top:14px}
  .actions button{
    flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
    border:1px solid var(--line);transition:.12s;
  }
  #copyBtn{background:var(--copy-bg);border-color:var(--copy-bg);color:var(--copy-txt)}
  #copyBtn:hover{background:var(--copy-hover);border-color:var(--copy-hover)}
  #copyBtn.done{background:var(--ink);border-color:var(--ink);color:#fff}
  #regenBtn{background:#fff;border-color:#fff;color:var(--ink)}
  #regenBtn:hover{background:#f0ece6;border-color:#f0ece6}
  .empty{color:var(--sub);text-align:center;padding:38px 10px;font-size:14px;background:var(--card2);border-radius:11px}
  .empty b{color:var(--accent)}
  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:24px;line-height:1.6}
  .toast{
    position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:#fff;padding:12px 22px;border-radius:999px;font-weight:700;white-space:nowrap;
    opacity:0;pointer-events:none;transition:.25s;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.18)
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

const pick=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// 받침(종성) 유무로 조사 선택 — 한국어 문법 자연스럽게
function hasBatchim(word){
  if(!word) return false;
  const c=word[word.length-1].charCodeAt(0);
  if(c<0xAC00||c>0xD7A3) return true; // 한글이 아니면(숫자/영어 등) 기본값
  return (c-0xAC00)%28!==0;
}
function josa(word,type){
  const b=hasBatchim(word);
  const map={"이":b?"이":"가","은":b?"은":"는","을":b?"을":"를","와":b?"과":"와","으로":b?"으로":"로","이라는":b?"이라는":"라는"};
  return word+(map[type]||"");
}

  "인테리어 감성":["인테리어가 감성적이라 사진 찍는 재미가 쏠쏠했어요.","공간이 취향 저격이라 머무는 것만으로 힐링됐어요."],

  "밤하늘 별빛":["밤에 별이 쏟아질 듯 보여서 그 자체로 낭만이었어요.","도심에선 못 보던 별빛에 한참을 올려다봤어요."],

  "내구성 훌륭":["몇 번을 써도 끄떡없어서 내구성 하나는 확실해요.","튼튼하게 잘 만들어져서 오래 쓸 것 같아요."],

  "소재 보들보들":["소재가 보들보들해서 살에 닿는 감촉이 좋았어요.","촉감이 부드러워서 만질 때마다 기분이 좋아요."],
  "주변 추천":["써보고 좋아서 주변에도 바로 추천했어요.","친구들한테 자랑하고 싶을 만큼 만족스러웠어요."],
  "선물용 적합":["패키지가 예뻐서 선물용으로도 딱이에요.","받는 사람이 좋아할 것 같아 선물로 하나 더 샀어요."],
  "디자인 대만족":["디자인이 예뻐서 볼 때마다 잘 샀다 싶어요.","군더더기 없이 깔끔한 디자인이라 어디에나 잘 어울려요."],
  "마감 깔끔":["마감이 깔끔해서 티 하나 없이 완성도가 높았어요.","바느질이며 마감이 꼼꼼해서 고급스러워 보였어요."],
  "사이즈 딱 맞음":["사이즈가 딱 맞아서 수선할 필요도 없었어요.","치수 그대로라 사이즈 걱정 없이 잘 맞았어요."],
  "인생 꿀템":["써보고 바로 인생템 등극했어요. 왜 이제 샀나 싶어요.","이건 진짜 꿀템이에요. 하나 더 쟁여두고 싶어요."],
  "관리 편함":["관리가 편해서 손 갈 일이 없어 좋아요.","세탁도 손질도 간편해서 부담 없이 써요."],
  "유행 안 탐":["유행 안 타는 디자인이라 오래 쓸 것 같아요.","질리지 않는 디자인이라 두고두고 쓸 만해요."],
  "유용한 기능":["생각지 못한 기능까지 있어서 쓸수록 편리해요.","기능이 알차서 쓸수록 손이 자주 가요."],
  "설명서 자세함":["설명서가 자세해서 처음 써도 헤맬 일이 없었어요.","사용법이 꼼꼼히 적혀 있어서 바로 이해했어요."],
  "가죽 부드러움":["가죽이 부드러워서 손에 닿는 느낌이 고급스러워요.","촉감 좋은 가죽이라 쓸수록 정이 가요."],
  "탄탄한 포장":["포장이 탄탄해서 험하게 와도 멀쩡했어요.","단단하게 싸여 와서 안심이 됐어요."],
  "가격 대비 만족":["가격 대비 만족스러워서 잘 샀다 싶어요.","이 값에 이 정도면 남는 장사예요."],
  "결점 없는 퀄리티":["흠잡을 데 없는 퀄리티라 하나하나 마음에 들었어요.","꼼꼼히 봐도 결점이 없어서 믿고 쓸 만해요."],
  "데일리 필수품":["매일 손이 가는 걸 보니 필수품이 됐어요.","한번 쓰고 나니 없으면 허전한 데일리템이에요."],
  "색감 예쁨":["색감이 화면보다 예뻐서 볼 때마다 기분이 좋아요.","색이 곱게 잘 빠져서 실물이 더 예뻐요."],
  "고급스러운 패키지":["패키지부터 고급스러워서 언박싱하는 맛이 있었어요.","포장 상자까지 신경 쓴 티가 나서 선물 받은 기분이었어요."],
  // 배달
  "신속한 배달":["주문하자마자 온 것처럼 배달이 빨라서 놀랐어요.","기다릴 틈도 없이 금방 도착해서 따뜻하게 먹었어요."],
  "따끈따끈함":["문 열자마자 따끈따끈해서 갓 만든 걸 먹는 것 같았어요.","배달인데도 김이 모락모락, 온기가 그대로였어요."],
  "요청사항 반영":["요청사항을 하나도 빠짐없이 챙겨주셔서 감동이었어요.","적어둔 대로 딱 맞춰주셔서 기분 좋게 먹었어요."],
  "리뷰 약속":["리뷰 약속 잊지 않고 서비스까지 챙겨주셨어요.","약속대로 챙겨주셔서 정 있는 사장님이라 느꼈어요."],
  "라이더 친절":["라이더분이 친절하게 전달해주셔서 기분이 좋았어요.","배달 오신 분이 상냥하셔서 첫인상부터 좋았어요."],
  "푸짐한 서비스":["서비스를 푸짐하게 챙겨주셔서 감동했어요.","덤으로 이것저것 넣어주셔서 인심이 후하더라고요."],
  "정성 가득":["한 그릇에도 정성이 가득 담겨 있어서 든든했어요.","대충이 없어요. 정성 들인 티가 그대로 났어요."],
  "따뜻한 국물":["국물이 식지 않고 뜨끈하게 와서 속이 확 풀렸어요.","따뜻한 국물 그대로라 배달이 맞나 싶었어요."],
  "바삭한 튀김":["튀김이 눅눅하지 않고 바삭해서 갓 튀긴 것 같았어요.","배달인데도 바삭함이 살아있어서 놀랐어요."],
  "안전한 포장":["포장이 안전해서 국물 하나 안 새고 왔어요.","꼼꼼히 밀봉돼 와서 흐트러짐 없이 도착했어요."],
  "가성비 폭발":["이 양에 이 가격이라니 가성비가 폭발해요.","가격 대비 양도 맛도 훌륭해서 자주 시킬 것 같아요."],
  "양 정말 많음":["양이 정말 많아서 두 끼로 나눠 먹었어요.","넉넉하게 담겨 와서 배부르게 먹었어요."],
  "흘림 없음":["국물 하나 안 흘리고 깔끔하게 와서 좋았어요.","꽉 밀봉돼 있어서 새는 것 없이 도착했어요."],
  "빠른 조리":["조리가 빨라서 배고플 때 시켜도 금방 왔어요.","주문 후 얼마 안 돼서 따끈하게 도착했어요."],
  "가족 저녁":["온 가족 저녁으로 시켰는데 다들 만족했어요.","가족끼리 든든하게 한 끼 해결하기 딱이었어요."],
  "야식 강력 추천":["야식으로 시켰는데 진리였어요. 강력 추천해요.","밤에 이거 시키면 후회 없어요. 야식 최고예요."],
  "또 주문할게요":["맛있어서 벌써 다음 주문을 예약해뒀어요.","두말 필요 없이 또 시킬 거예요."],
  "완벽한 밀봉":["완벽하게 밀봉돼 와서 위생 걱정 없이 먹었어요.","빈틈없이 포장돼 있어서 안심하고 먹었어요."],
  "소스 넉넉":["소스를 넉넉히 넣어주셔서 부족함 없이 먹었어요.","소스 인심이 후해서 찍어 먹는 재미가 있었어요."],
  "단골 예약":["첫 주문부터 단골 예약이에요. 계속 시킬 것 같아요.","맛보고 바로 단골집 등록했어요."],
  "신선도 유지":["신선도가 그대로라 재료 상태가 좋았어요.","배달인데도 재료가 싱싱해서 만족스러웠어요."],
  "따뜻하게 도착":["식지 않고 따뜻하게 도착해서 갓 만든 맛 그대로였어요.","온기가 살아있어서 배달인 걸 잊을 정도였어요."],
  "위생적인 포장":["포장이 위생적이라 먹기 전부터 믿음이 갔어요.","깔끔하게 밀봉돼 와서 안심하고 먹었어요."],
  // 미용
  "인생 스타일":["원하던 스타일 그대로 나와서 인생 스타일 건졌어요.","거울 보고 반했어요. 이런 스타일 처음이에요."],
  "세련된 감각":["디자이너분 감각이 세련돼서 믿고 맡길 수 있었어요.","트렌드를 잘 아셔서 딱 요즘 스타일로 해주셨어요."],
  "친절한 상담":["상담부터 친절해서 원하는 걸 편하게 말할 수 있었어요.","꼼꼼히 상담해주셔서 결과까지 만족스러웠어요."],
  "깔끔한 샵":["샵이 깔끔해서 있는 내내 기분이 좋았어요.","공간이 정돈돼 있어서 관리받기 쾌적했어요."],
  "어울리는 컷":["얼굴형에 딱 맞는 컷으로 해주셔서 만족스러웠어요.","나한테 어울리는 컷을 정확히 잡아주셨어요."],
  "꼼꼼한 시술":["시술을 꼼꼼히 해주셔서 마무리까지 완벽했어요.","하나하나 세심하게 봐주셔서 믿음이 갔어요."],
  "두피 마사지":["중간중간 두피 마사지까지 해주셔서 힐링됐어요.","마사지가 시원해서 나른하게 쉬다 왔어요."],
  "손상 최소화":["손상 없이 관리해주셔서 머릿결이 그대로예요.","약을 세심하게 써주셔서 상함 없이 예쁘게 됐어요."],
  "네일 디자인 대만족":["네일 디자인이 딱 원하던 대로라 대만족이에요.","손끝 볼 때마다 기분 좋아지는 디자인이에요."],
  "지속력 최고":["시간이 지나도 그대로라 지속력 하나는 최고예요.","오래가서 자주 안 와도 될 것 같아요."],
  "친절한 소통":["소통이 편해서 원하는 걸 정확히 전달할 수 있었어요.","계속 물어봐 주셔서 어긋남 없이 진행됐어요."],
  "편안한 대기실":["대기실이 편해서 기다리는 시간도 편안했어요.","공간이 아늑해서 대기하는 동안 쉬는 기분이었어요."],
  "맞춤형 서비스":["내 상태에 맞춰 딱 맞는 케어를 해주셨어요.","획일적이지 않고 나한테 맞춰주셔서 좋았어요."],
  "트렌디한 스타일":["요즘 유행하는 스타일로 감각 있게 해주셨어요.","트렌디하게 잡아주셔서 어디 가서든 자신 있어요."],
  "재방문 의사 100%":["두말할 것 없이 또 올 거예요. 재방문 100%예요.","여기만 다니려고요. 재방문 의사 확실해요."],
  "예약 편리":["예약이 편해서 원하는 시간에 쉽게 잡았어요.","예약 과정이 간편해서 번거로움이 없었어요."],
  "합리적인 가격":["퀄리티에 비해 가격이 합리적이라 부담 없었어요.","이 정도 서비스에 이 가격이면 아주 만족이에요."],

  "모발 관리 꿀팁":["집에서 할 수 있는 관리 꿀팁까지 알려주셨어요.","관리법을 자세히 알려주셔서 유용했어요."],
  "만족도 최상":["결과부터 과정까지, 이보다 만족스러울 수 없어요.","기대 이상이라 나올 때 절로 웃음이 났어요."],
  "실력 있는 디자이너":["디자이너분 실력이 좋아서 믿고 맡겼어요.","손이 빠르고 정확하셔서 결과가 완벽했어요."],

  "기분전환 성공":["다녀오고 나니 기분 전환 제대로 됐어요.","새 단장하고 나오니 발걸음이 다 가벼웠어요."],
  // 운동
  "친절한 트레이너":["트레이너분이 친절해서 운동이 하나도 안 무서웠어요.","편하게 알려주셔서 초보인 저도 잘 따라갔어요."],
  "체계적인 수업":["수업이 체계적이라 뭘 해야 할지 헤맬 일이 없었어요.","단계별로 차근차근 이끌어주셔서 효과가 확실했어요."],
  "쾌적한 시설":["시설이 쾌적해서 운동할 맛이 나더라고요.","공간이 넓고 깨끗해서 갈 때마다 기분이 좋아요."],

// 템플릿 채우기: {kw}, {kw:이|은|을|이라는}, {kw0...}, {loc}, {svc}
function fill(t, kw, kw0, svc, loc){
  return t
    .replace(/\{kw0:(이|은|을|와|으로|이라는)\}/g,(_,p)=>josa(kw0,p))
    .replace(/\{kw:(이|은|을|와|으로|이라는)\}/g,(_,p)=>josa(kw,p))
    .replace(/\{kw0\}/g, kw0||"")
    .replace(/\{kw\}/g, kw||"")
    .replace(/\{loc\}/g, loc||kw0||"")
    .replace(/\{svc\}/g, svc||"정성껏 챙겨주셔서");
}

function generate(){
  let raw = document.getElementById("keywords").value.trim();
  if(!raw){ shake(); return null; }
  let kws = raw.split(/[,，·\n]/).map(s=>s.trim()).filter(Boolean);
  if(kws.length===0){ shake(); return null; }

  const bank = BANK[state.type];
  const target = +lenRange.value;
  const rating = state.rating;
  const tier = rating>=4 ? "pos" : (rating===3 ? "mid" : "neg");

  // 시간 키워드(주말 등)는 리뷰에서 제외
  kws = kws.filter(k=>!isTime(k));
  if(kws.length===0){ shake(); return null; }

  // 키워드 분류: 지역(장소), 서비스/태도, 감탄·칭찬 슬랭, 나머지(특징)
  const locationKws = kws.filter(isLocation);
  const serviceKws  = kws.filter(k=>!isLocation(k) && isServiceWord(k));
  const praiseKws   = kws.filter(k=>!isLocation(k) && !isServiceWord(k) && isPraiseWord(k));
  let featureKws    = kws.filter(k=>!isLocation(k) && !isServiceWord(k) && !isPraiseWord(k));
  const loc   = locationKws[0] || "";
  const topic = featureKws[0] || locationKws[0] || kws[0]; // 오프너 등에서 쓸 주제어
  const svcPhrase = serviceKws.length ? SERVICE_EXPAND[pick(serviceKws)] : "정성껏 챙겨주셔서";
  const F = (t,k)=> fill(t, k, topic, svcPhrase, loc);

  // 키워드별 전용 문장 우선 → 서술형(여러 단어)은 공용 전용 문장 → 단어형은 업종 본문
  const isPhrase = k=>/\s/.test(k);
  const bodyFor = (k,pool,idx)=>{
    const ks = keywordSentence(k);
    if(ks) return F(ks, k);
    return isPhrase(k) ? F(pick(PHRASE_BODY), k) : F(pool[idx % pool.length], k);
  };

  // 도입/마무리(항상 포함)와 본문 후보(우선순위 순)를 톤에 맞게 구성
  let opener, closer, content=[], fillerPool;

  if(tier==="neg"){
    // ── 부정 톤 (별점 1~2) ──
    opener = F(pick(NEG_OPEN));
    closer = F(pick(NEG_CLOSE));
    const negPool = shuffle(NEG_BODY);
    content = featureKws.map((k,idx)=> F(negPool[idx % negPool.length], k));
    fillerPool = shuffle(NEG_FILLER);

  } else if(tier==="mid"){
    // ── 중립 톤 (별점 3) ──
    opener = F(pick(MID_OPEN));
    closer = F(pick(MID_CLOSE));
    const bodyPool = shuffle(bank.body);
    content = featureKws.map((k,idx)=> idx % 2 === 0 ? bodyFor(k,bodyPool,idx) : F(pick(MID_CON), k));
    if(featureKws.length<=1) content.push(F(pick(MID_CON), topic));
    fillerPool = shuffle(MID_FILLER);

  } else {
    // ── 긍정 톤 (별점 4~5) ──
    const openPool = (loc && bank.openLoc) ? bank.openLoc : bank.open;
    opener = F(pick(openPool));
    closer = F(pick(bank.close));
    const bodyPool = shuffle(bank.body);
    // 반응 키워드(존맛·느좋 등)를 앞쪽에 배치해 짧은 목표에서도 잘리지 않게
    praiseKws.forEach(k=> content.push(praisePhrase(k)));
    featureKws.forEach((k,idx)=> content.push(bodyFor(k,bodyPool,idx)));
    if(serviceKws.length || Math.random()<0.7)                     // 서비스 문장
      content.push(F(pick(bank.service), topic));
    content.push(rating===5 ? pick(POS5_BOOST) : pick(POS4_NOTE)); // 별점별 마무리 톤
    fillerPool = shuffle(state.type==="product" ? PRODUCT_FILLER : FILLER);
  }

  // 리뷰에 섞을 이모지 (톤별, 1~2개)
  const epool = EMOJI[tier];
  const openEmoji = tier==="pos" ? " "+pick(epool) : "";  // 긍정이면 도입부에도 하나

  // 목표 길이에 맞춰 조립 (도입+마무리는 필수, 나머지는 목표 안에서 채움)
  const parts = [opener + openEmoji];
  const closerLen = closer.length + 3;
  const curLen = ()=> parts.join(" ").length + closerLen;
  for(const s of content){
    if(curLen() >= target) break;   // 목표를 넘어서기 직전까지만 본문 추가
    parts.push(s);
  }
  let fi=0;                          // 아직 모자라면 채움 문장으로 보정
  while(curLen() < target && fi < fillerPool.length){
    parts.push(fillerPool[fi]); fi++;
  }
  parts.push(closer + " " + pick(epool));  // 마무리에 이모지 하나
  return parts.join(" ");
}

function render(text){
  const out=document.getElementById("output");
  document.getElementById("emptyState").style.display="none";
  out.style.display="block";
  document.getElementById("actions").style.display="flex";
  out.value=text;
  document.getElementById("charCount").textContent=text.length;
}

// 동전 짤랑~ 효과음 (Web Audio, 외부 파일 없이 합성)
let _actx;
function playCoin(){
  try{
    _actx = _actx || new (window.AudioContext||window.webkitAudioContext)();
    if(_actx.state==="suspended") _actx.resume();
    const now=_actx.currentTime;
    [[988,0],[1319,0.09]].forEach(([f,t])=>{      // 아케이드 동전음 (B5→E6)
      const o=_actx.createOscillator(), g=_actx.createGain();
      o.type="square"; o.frequency.value=f;
      o.connect(g); g.connect(_actx.destination);
      g.gain.setValueAtTime(0.0001, now+t);
      g.gain.exponentialRampToValueAtTime(0.22, now+t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now+t+0.16);
      o.start(now+t); o.stop(now+t+0.18);
    });
  }catch(e){}
}

const genBtn=document.getElementById("genBtn");
genBtn.onclick=()=>{
  const t=generate(); if(!t) return;           // 키워드 없으면 흔들기만
  playCoin();                                    // 동전 넣는 소리
  genBtn.classList.remove("inserting");
  void genBtn.offsetWidth;                       // 애니메이션 재시작
  genBtn.classList.add("inserting");             // 동전 투입 애니메이션
  setTimeout(()=>{ render(t); genBtn.classList.remove("inserting"); }, 430);
};
document.getElementById("regenBtn").onclick=()=>{
  const t=generate(); if(t) render(t);
};
document.getElementById("output").oninput=e=>{
  document.getElementById("charCount").textContent=e.target.value.length;
};

// copy
const copyBtn=document.getElementById("copyBtn");
copyBtn.onclick=async()=>{
  const text=document.getElementById("output").value;
  if(!text) return;
  try{ await navigator.clipboard.writeText(text); }
  catch(e){
    const out=document.getElementById("output"); out.select(); document.execCommand("copy");
    window.getSelection().removeAllRanges();
  }
  showToast();
  copyBtn.textContent="복사 완료"; copyBtn.classList.add("done");
  setTimeout(()=>{copyBtn.textContent="복사하기";copyBtn.classList.remove("done");},1600);
};

// enter key to generate
document.getElementById("keywords").addEventListener("keydown",e=>{
  if(e.key==="Enter"){ e.preventDefault(); const t=generate(); if(t) render(t); }
});

function showToast(){
  const el=document.getElementById("toast");
  el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),1600);
}
function shake(){
  const inp=document.getElementById("keywords");
  inp.style.borderColor="var(--warn)";
  inp.placeholder="키워드부터 좀 주세요... 빈손이면 저도 곤란해요";
  setTimeout(()=>{inp.style.borderColor="";setPlaceholder();},1200);
  inp.focus();
}
</script>
